name: CI

on:
  pull_request:
    branches: [master, iteration*]
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/atlas_test
      RUN_DATABASE_INTEGRATION: "1"
      SESSION_SECRET: test-session-secret
      FRONTEND_URL: http://127.0.0.1:4173
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.3.0"
          cache: "npm"

      - name: Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run backend tests
        run: cd backend && npm test

      - name: Run backend AI eval suite
        run: cd backend && npm run test:ai-evals

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        run: cd frontend && FULL_STACK_E2E=1 npm run test:e2e
